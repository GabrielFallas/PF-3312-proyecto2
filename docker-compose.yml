# ============================================================
#  docker-compose.yml - Banco de pruebas PF-3312
#
#  Dos servicios:
#   - ollama     : servidor de LLMs locales (expone API en :11434)
#   - benchmark  : la aplicacion Python que ejecuta las pruebas
#
#  Uso tipico (FUNCIONA EN CUALQUIER EQUIPO, con o sin GPU):
#     docker compose up -d ollama                 # levanta Ollama (CPU)
#     docker compose run --rm ollama-pull         # descarga los 5 LLM locales
#     docker compose run --rm benchmark           # corre el banco completo
#
#  Para ACELERAR con GPU NVIDIA (requiere nvidia-container-toolkit en el host),
#  agrega el override de GPU en cada comando:
#     docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d ollama
#
#  Este compose BASE no exige GPU, de modo que corre en una maquina limpia sin
#  hardware NVIDIA (solo CPU). El override docker-compose.gpu.yml es opcional.
# ============================================================
services:

  ollama:
    image: ollama/ollama:latest
    container_name: pf3312-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama        # persiste los modelos descargados
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Servicio auxiliar de un solo uso para descargar los 5 LLMs del benchmark.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: pf3312-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama pull llama3.1:8b &&
       ollama pull mistral:7b &&
       ollama pull phi3.5 &&
       ollama pull gemma2:9b &&
       ollama pull qwen2.5:7b"
    restart: "no"

  benchmark:
    build: .
    container_name: pf3312-benchmark
    depends_on:
      ollama:
        condition: service_healthy
    # Carga las API keys de los servicios en la nube desde .env (si existe).
    # El .env NO se versiona; las llaves nunca quedan en la imagen.
    env_file:
      - path: .env
        required: false
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - N_RUNS=5
      - RESULTS_DIR=results
    volumes:
      # Monta carpetas para que los resultados/figuras/audios queden en el host.
      - ./results:/app/results
      - ./report:/app/report
      - ./data:/app/data
      - ./tts_output:/app/tts_output
      - ./models:/app/models
    # Sobrescribe el comando para correr solo una etapa, p.ej.:
    #   docker compose run --rm benchmark benchmarks/llm_benchmark.py
    restart: "no"

volumes:
  ollama_models:
